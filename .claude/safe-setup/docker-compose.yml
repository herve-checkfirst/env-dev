services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.claude
    privileged: true
    volumes:
      - ../..:/workspace
      - claude-history:/home/osint/.claude
      - bash-history:/home/osint/.bash_history_dir
      - docker-data:/var/lib/docker
    environment:
      - PGHOST=postgres
      - PGUSER=osint
      - PGPASSWORD=osint
      - PGDATABASE=osint
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
    depends_on:
      - postgres
    stdin_open: true
    tty: true

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=osint
      - POSTGRES_PASSWORD=osint
      - POSTGRES_DB=osint
    ports:
      - "5433:5432"

volumes:
  claude-history:
  bash-history:
  docker-data:
